name: CI Demo


on: push   # assistant



jobs:
    lint: # name
        runs_on: ubuntu-latest  # runner

      steps: 
          - name: Checkout code # pull the klatest code from runner
          - uses: actions/checkout@v3

          - name: Setup Python
          - uses: actions/setup-puthon@v4

          - name: Install dependencies
            run: |
                python -m pip install --upgrade pip
                pip install flake8

          - name: Run flake8
            runs: |
                flake8 example.py  






